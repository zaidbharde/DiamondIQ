name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes

      - name: Check Python syntax with pyflakes
        run: |
          pyflakes webapp/ app.py setup.py

      - name: Verify imports
        run: |
          python -c "
            from webapp import create_app
            from webapp.config import Config
            from webapp.database import init_db
            from webapp.image_analysis import analyze_image
            from webapp.ai_provider import select_provider, get_openai_model, get_gemini_model
            from webapp.validation import sanitize_payload
            from webapp.ml_service import PredictionService
            from webapp.ocr_service import extract_text_from_image
            print('All imports successful')
          "

      - name: Verify app configuration loads
        run: |
          python -c "
            import os
            os.environ['AI_PROVIDER'] = 'auto'
            from webapp.config import Config
            cfg = Config()
            assert cfg.SECRET_KEY
            print(f'Config OK: DEBUG={cfg.DEBUG}')
          "

      - name: Check for hardcoded secrets
        run: |
          ! grep -r "sk-[A-Za-z0-9]" --include="*.py" --include="*.js" --include="*.html" . 2>/dev/null | grep -v node_modules | grep -v ".env" || { echo "API key found in source!"; exit 1; }
          echo "No hardcoded secrets found"
